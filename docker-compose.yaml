services:
  # 1. Inference Engine: Blackwell-Optimized for 5070 Ti
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
      - C:/Apollo/Intel:/root/apollo_intel
      - C:/Apollo/Vault:/root/apollo_vault
    environment:
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q4_0
      - OLLAMA_NUM_GPU=-1          # Forces all layers to the 16GB 5070 Ti
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # 2. Primary Interface: Human-AI Collaboration Dashboard
  open-webui:
    image: ghcr.io/open-webui/open-webui:cuda
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=apollo_v2_secret
    volumes:
      - ./data/open-webui:/app/backend/data
      - C:/Apollo/Intel:/app/backend/data/apollo_intel
    depends_on:
      - ollama

  # 3. Automation Conductors: n8n & Postgres
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_RUNNERS_ENABLED=true
    volumes:
      - ./data/n8n:/home/node/.n8n
      - C:/Apollo/Intel:/home/node/apollo_intel
    depends_on:
      - n8n_db

  n8n_db:
    image: postgres:16
    container_name: n8n_db
    restart: always
    environment:
      POSTGRES_USER: apollo_admin
      POSTGRES_PASSWORD: secure_password_2026
      POSTGRES_DB: apollo_state
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  # 4. Ingestion Stage 1: The Purifier (HTML/PDF to MD)
  docling:
    image: ghcr.io/docling-project/docling-serve:latest
    container_name: docling
    ports:
      - "5001:5001"
    volumes:
      - C:/Apollo/Vault/Raw:/root/apollo_raw     # In: Gemini HTML/PDFs
      - C:/Apollo/Vault/Clean:/root/apollo_clean # Out: Purified Markdown

  # 5. Ingestion Stage 2: The Knowledge Engine (Relationship Mapping)
  lightrag:
    image: ghcr.io/hkuds/lightrag:latest
    container_name: apollo-lightrag
    command: ["python3", "-m", "lightrag.api.lightrag_server", "--auto-scan-at-startup"]
    ports:
      - "9621:9621"
    volumes:
      - C:/Apollo/Vault/Database:/app/data/rag_storage # GraphML & Vector Store
      - C:/Apollo/Vault/Clean:/app/data/inputs        # Monitors Clean MD Only
    environment:
      - LLM_BINDING=ollama
      - LLM_BINDING_HOST=http://ollama:11434
      - LLM_MODEL=Apollo-Architect               # Ministral 14B Q6_K
      - EMBEDDING_BINDING=ollama
      - EMBEDDING_BINDING_HOST=http://ollama:11434
      - EMBEDDING_MODEL=nomic-embed-text
      - SUMMARY_CONTEXT_SIZE=32000               # Deep Context Priority
      - CHUNK_SIZE=1200                          # Balanced for 32k window
    depends_on:
      - ollama

  # 6. The Librarian: Active Orchestrator
  apollo-agent:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: apollo-agent
    ports:
      - "18789:18789"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENCLAW_GATEWAY_BIND=lan
      - OPENCLAW_GATEWAY_PORT=18789
      - ALLOW_FILE_MODIFICATION=true
      - ALLOW_DESKTOP_INTERACTION=true
      - WORKSPACE_DIR=/home/node/.openclaw/workspace
      - DEFAULT_MODEL=Apollo-Strategist
    volumes:
      - C:/Apollo/Intel:/home/node/.openclaw
      - C:/Apollo/Intel/workspace:/home/node/.openclaw/workspace
      - C:/Apollo/Vault:/root/apollo_vault
    depends_on:
      - ollama
    command: ["node", "dist/index.js", "gateway"]
    restart: unless-stopped

  # 7. Stealth Scouts: Browsing & Scraping
  browserless:
    image: browserless/chrome:latest
    container_name: browserless
    restart: unless-stopped
    ports:
      - "3003:3000"

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: apollo-scout
    ports:
      - "11235:11235"
    environment:
      - MAX_CONCURRENT_TASKS=3
    restart: unless-stopped